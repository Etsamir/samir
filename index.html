<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akkauntlar Bozori</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f8f9fa; }
        
        .header { background-color: #000; padding: 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; display: flex; justify-content: center; }
        .search-box { position: relative; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 20px; padding-right: 40px; border-radius: 25px; border: none; outline: none; background-color: #e9ecef; font-size: 16px; font-weight: bold; }
        .search-box svg { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #000; }
        
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .admin-panel { background: #fff; border: 3px solid #000; border-radius: 15px; padding: 20px; margin-bottom: 20px; display: none; }
        .admin-panel h3 { text-align: center; margin-bottom: 15px; }
        .admin-panel input, .admin-panel textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 8px; font-size: 14px; }
        .admin-panel button { width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .card { border: 5px solid #000; border-radius: 20px; background-color: #d9d9d9; margin-bottom: 25px; overflow: hidden; }
        .video-placeholder { background-color: #000; height: 220px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 5px solid #000; position: relative; }
        .video-placeholder video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .card-content { padding: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .account-name { font-size: 18px; font-weight: 900; }
        .account-price { background-color: #000; color: #fff; padding: 5px 15px; border-radius: 15px; font-weight: bold; }
        .account-info { font-weight: bold; }
        .account-desc-text { font-size: 14px; color: #333; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchAccounts()">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
    </div>

    <div class="container">
        <div class="admin-panel" id="adminPanel">
            <h3>Yangi Akkaunt Qo'shish</h3>
            
            <label style="font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block;">Video fayl nomi:</label>
            <input type="text" id="addVideoName" placeholder="Masalan: 1.mp4 yoki 2.mp4">
            
            <input type="text" id="addName" placeholder="Akkaunt nomi">
            <textarea id="addDesc" rows="3" placeholder="Opisaniyasi (masalan: AK-47 bor)"></textarea>
            <input type="text" id="addPrice" placeholder="Narxi (masalan: 90.000)">
            <button onclick="processAccount()">Qo'shish</button>
        </div>

        <div id="accountsList"></div>
    </div>

    <script>
        // DIQQAT: GitHub Pages uchun asosiy akkauntlar shu yerda turadi!
        // Siz o'zingizdagi 1.mp4 ni papkaga tashlaganingiz uchun bu avtomat ishlaydi.
        let defaultAccounts = [
            { 
                id: 1, 
                video: "1.mp4", 
                name: "Gold Akkaunt", 
                desc: "Bu mening birinchi videoyim (1.mp4)", 
                price: "90.000" 
            }
        ];

        let accounts = JSON.parse(localStorage.getItem('accounts')) || defaultAccounts;

        window.onload = function() {
            renderAccounts(accounts);
            setTimeout(() => {
                let ism = prompt("Saytga xush kelibsiz! Ismingiz yoki maxfiy kodni kiriting:");
                if (ism === "8106") {
                    document.getElementById("adminPanel").style.display = "block";
                }
            }, 500);
        };

        function renderAccounts(data) {
            const list = document.getElementById('accountsList');
            list.innerHTML = '';

            data.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Endi shunchaki yozilgan "1.mp4" nomini o'qiydi
                const videoHtml = acc.video 
                    ? `<video src="${acc.video}" controls autoplay muted loop playsinline></video>` 
                    : `#Accounts vedeo`;

                card.innerHTML = `
                    <div class="video-placeholder">
                        ${videoHtml}
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <div class="account-name">${acc.name}</div>
                            <div class="account-price">${acc.price}</div>
                        </div>
                        <div class="account-info">Accounts info</div>
                        <div class="account-desc-text">${acc.desc}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function searchAccounts() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filteredAccounts = accounts.filter(acc => {
                return acc.name.toLowerCase().includes(searchText) || 
                       acc.desc.toLowerCase().includes(searchText);
            });
            renderAccounts(filteredAccounts);
        }

        function processAccount() {
            const videoName = document.getElementById('addVideoName').value;
            const name = document.getElementById('addName').value;
            const desc = document.getElementById('addDesc').value;
            const price = document.getElementById('addPrice').value;

            if (name === "" || price === "") {
                alert("Nomini va narxini yozing!");
                return;
            }

            // Endi og'ir faylni emas, shunchaki fayl nomini matn sifatida saqlaymiz!
            const newAccount = {
                id: Date.now(),
                video: videoName, // Masalan: "2.mp4"
                name: name,
                desc: desc,
                price: price
            };

            accounts.unshift(newAccount);
            localStorage.setItem('accounts', JSON.stringify(accounts));
            
            document.getElementById('addVideoName').value = '';
            document.getElementById('addName').value = '';
            document.getElementById('addDesc').value = '';
            document.getElementById('addPrice').value = '';

            renderAccounts(accounts);
        }
    </script>
</body>
</html>
