<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квадратный Метр</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="pb-28">

    <div id="home-page" class="max-w-md mx-auto px-4 pt-6 block">
        
        <h1 class="text-3xl mb-6 font-semibold">Квадратный Метр</h1>

        <div class="flex items-center bg-[#D9D9D9] rounded-full overflow-hidden mb-8 h-10">
            <input type="text" class="bg-transparent flex-grow px-4 text-black outline-none placeholder-gray-600" placeholder="Qidiruv...">
            <button class="bg-[#6b6b6b] text-white w-12 h-full flex items-center justify-center rounded-r-full hover:bg-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-x-4 gap-y-6" id="home-grid">
            </div>

    </div>

    <div id="detail-page" class="max-w-md mx-auto hidden pb-6">
        
        <div class="w-full h-80 bg-[#D9D9D9] flex flex-col items-center justify-center text-black mb-4" id="detail-img-box">
            <span class="font-bold text-xl" id="detail-img-name">4.png</span>
            <span class="text-md" id="detail-img-size">120x60</span>
        </div>

        <div class="px-4 flex justify-between items-start mb-2">
            <div>
                <p class="text-sm text-gray-400 mb-1">Квадратный Метр</p>
                <h2 class="text-2xl font-bold" id="detail-title">Kafel nomi 4</h2>
                <p class="text-lg text-gray-200 mt-1" id="detail-price">90.000 so'm kv</p>
            </div>
            <button class="flex flex-col items-center justify-center mt-2">
                <div class="bg-transparent border border-white rounded-xl p-2 mb-1 hover:bg-gray-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="11"></line>
                        <line x1="9" y1="8" x2="15" y2="8"></line>
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </div>
                <span class="text-xs">Cart ></span>
            </button>
        </div>

        <div class="px-4 mb-6">
            <div class="border border-gray-700 rounded-lg p-3 inline-block">
                <p class="text-sm text-gray-300" id="detail-size-text">Razmer: 120x60</p>
                <p class="text-sm text-gray-300">Yuza: Glyansoviy (Yaltiroq)</p>
            </div>
        </div>

        <div class="px-4">
            <h3 class="text-lg mb-4">O'xshash kafellar</h3>
            <div class="grid grid-cols-2 gap-4 mb-8" id="similar-grid">
                </div>

            <div class="flex justify-center mb-8">
                <button onclick="showHome()" class="bg-[#D9D9D9] text-black px-8 py-2 rounded-full text-sm font-bold hover:bg-gray-300">
                    Yana Qidrish
                </button>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 w-full bg-[#121212] py-3 border-t border-gray-800 z-50">
        <div class="max-w-md mx-auto px-12 flex justify-between">
            <button onclick="showHome()" class="bg-[#D9D9D9] p-3 rounded-2xl w-20 h-14 flex items-center justify-center hover:bg-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            </button>
            
            <button class="bg-[#D9D9D9] p-3 rounded-2xl w-20 h-14 flex items-center justify-center hover:bg-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </button>
        </div>
    </nav>

    <script>
        const homePage = document.getElementById('home-page');
        const detailPage = document.getElementById('detail-page');
        const homeGrid = document.getElementById('home-grid');
        const similarGrid = document.getElementById('similar-grid');

        // 1 dan 50 gacha ma'lumotlarni avtomatik yaratish
        const tiles = [];
        for (let i = 1; i <= 50; i++) {
            tiles.push({
                id: i,
                filename: `${i}.png`,
                size: (i % 2 === 0) ? '120x60' : '60x60', // Juft sonlarga 120x60, toqlarga 60x60
                title: `${i}`,
                price: "90.000 so'm kv"
            });
        }

        // Kartochka chizish funksiyasi
        function createCardHtml(tile) {
            // Agar haqiqiy rasmlarni ulamoqchi bo'lsangiz, bg-[#D9D9D9] div o'rniga <img> tag ishlating:
            // <img src="images/${tile.filename}" class="w-full h-40 object-cover rounded-md mb-2">
            
            return `
                <div class="cursor-pointer" onclick="showDetail(${tile.id})">
                    <div class="w-full h-40 bg-[#D9D9D9] rounded-sm flex flex-col items-center justify-center text-black mb-2">
                        <span class="font-semibold text-lg">${tile.filename}</span>
                        <span class="text-sm">${tile.size}</span>
                    </div>
                    <h3 class="font-bold text-lg mb-0.5">${tile.title}</h3>
                    <p class="text-sm text-gray-300">${tile.price}</p>
                </div>
            `;
        }

        // Bosh sahifaga barcha 50 ta mahsulotni chiqarish
        function renderHome() {
            homeGrid.innerHTML = tiles.map(tile => createCardHtml(tile)).join('');
        }

        // O'xshash mahsulotlar uchun tasodifiy 4 tasini tanlash
        function renderSimilar() {
            // Shunchaki namuna uchun 3, 5, 7, 8 - id larni olamiz
            const similarTiles = [tiles[2], tiles[4], tiles[6], tiles[7]];
            similarGrid.innerHTML = similarTiles.map(tile => createCardHtml(tile)).join('');
        }

        function showHome() {
            detailPage.classList.add('hidden');
            homePage.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function showDetail(id) {
            const tile = tiles.find(t => t.id === id);
            if(!tile) return;

            // Ma'lumotlarni sahifaga yozish
            document.getElementById('detail-img-name').textContent = tile.filename;
            document.getElementById('detail-img-size').textContent = tile.size;
            document.getElementById('detail-title').textContent = `Kafel nomi ${tile.title}`;
            document.getElementById('detail-price').textContent = tile.price;
            document.getElementById('detail-size-text').textContent = `Razmer: ${tile.size}`;

            homePage.classList.add('hidden');
            detailPage.classList.remove('hidden');
            
            renderSimilar(); // Har safar kirganda o'xshashlarni yangilash
            window.scrollTo(0, 0);
        }

        // Dasturni ishga tushirish
        renderHome();
    </script>
</body>
</html>
